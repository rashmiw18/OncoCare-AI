{% extends "base.html" %}


{% block title %}

Register | OncoCare AI

{% endblock %}


{% block content %}

<div class="auth-page">


    <div class="auth-card">


        <div class="brand-logo">

            <div class="logo-symbol">

                ✦

            </div>


            <div>

                <h1>

                    OncoCare AI

                </h1>


                <span>

                    INTELLIGENT HEALTH MONITORING

                </span>

            </div>

        </div>


        <div class="auth-heading">

            <p class="eyebrow">

                GET STARTED

            </p>


            <h2>

                Create your account

            </h2>


            <p>

                Begin your personalized health monitoring journey.

            </p>

        </div>


        <form

            method="POST"

            class="auth-form"

        >


            <div class="form-group">

                <label>

                    Full Name

                </label>


                <input

                    type="text"

                    name="name"

                    placeholder="Enter your full name"

                    required

                >

            </div>


            <div class="form-group">

                <label>

                    Email Address

                </label>


                <input

                    type="email"

                    name="email"

                    placeholder="you@example.com"

                    required

                >

            </div>


            <div class="form-group">

                <label>

                    Password

                </label>


                <input

                    type="password"

                    name="password"

                    placeholder="Create a password"

                    required

                >

            </div>


            <div class="form-group">

                <label>

                    Confirm Password

                </label>


                <input

                    type="password"

                    name="confirm_password"

                    placeholder="Confirm your password"

                    required

                >

            </div>


            <button

                type="submit"

                class="primary-button"

            >

                Create Account

            </button>


        </form>


        <p class="auth-footer">

            Already have an account?

            <a href="{{ url_for(
                'auth.login'
            ) }}">

                Sign in

            </a>

        </p>


    </div>


</div>

{% endblock %}
